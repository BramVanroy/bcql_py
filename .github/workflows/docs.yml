name: Publish docs to GitHub Pages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:

# Cancel any in-progress docs deploy for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --locked --group docs

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages branch for mike
        run: git fetch origin gh-pages --depth=1 || true

      - name: Deploy release docs (tag -> version + latest)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          uv run mike deploy --push --update-aliases "${VERSION}" latest
          uv run mike set-default --push latest

      - name: Deploy development docs (main -> dev)
        if: github.ref == 'refs/heads/main'
        run: uv run mike deploy --push --update-aliases dev
