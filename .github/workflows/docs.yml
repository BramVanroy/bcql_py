name: Publish docs to GitHub Pages

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

# Cancel any in-progress docs deploy for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --locked --group docs

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages branch for mike
        run: git fetch origin gh-pages --depth=1 || true

      - name: Check if release docs version already exists
        id: release_version_check
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          if git show origin/gh-pages:versions.json 2>/dev/null | grep -q "\"version\": \"${VERSION}\""; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip release deploy when version already exists
        if: github.event_name == 'release' && steps.release_version_check.outputs.exists == 'true'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Release docs version '${VERSION}' already exists on gh-pages; skipping deploy."

      - name: Deploy release docs (tag -> version + set as latest)
        if: github.event_name == 'release' && steps.release_version_check.outputs.exists != 'true'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          uv run mike deploy --push --update-aliases "${VERSION}" latest
          uv run mike set-default --push latest

      - name: Deploy development docs (i.e. latest commit on main)
        if: github.ref == 'refs/heads/main'
        run: uv run mike deploy --push --update-aliases main
