# For more options and details see https://www.mkdocs.org/user-guide/configuration/
# Basic site metadata used in the generated HTML, metadata tags, and canonical URLs
site_name: bcql_py
site_description: A parser for BlackLab Corpus Query Language (BCQL) with Pydantic v2 AST (Abstract Syntax Tree), JSON serialization, schema validation, and LLM-friendly errors.
site_url: https://bramvanroy.github.io/bcql_py/

# Repository links shown in the header and used for "edit this page" links
repo_url: https://github.com/BramVanroy/bcql_py
repo_name: BramVanroy/bcql_py
# Resolved relative to repo_url; points docs pages at the source docs/ directory
edit_uri: edit/main/docs/

# Material for MkDocs theme configuration. See https://squidfunk.github.io/mkdocs-material/
theme:
  name: material
  features:
    # Adds a copy button to code blocks
    - content.code.copy
    # Enables inline code annotations in fenced code blocks
    - content.code.annotate
    # Shows the top-level nav as tabs
    - navigation.tabs
    # Keeps the top tabs visible while scrolling
    - navigation.tabs.sticky
    # Expands the sidebar into named sections
    - navigation.sections
    # Treats index pages as section landing pages
    - navigation.indexes
    # Adds a back-to-top button
    - navigation.top
    # Highlights matching terms in search results/pages
    - search.highlight
    # Shows live search suggestions while typing
    - search.suggest
    # Keeps the table of contents synced while scrolling
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      # The default Material light theme
      scheme: default
      # Main brand color used for the header and active elements
      primary: indigo
      # Accent color for links, buttons, and highlights
      accent: indigo
      # Icon/text shown in the theme switcher
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      # The default Material dark theme
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Build hook for custom MkDocs behavior during site generation
hooks:
  - docs/hooks.py

# Plugins extend MkDocs with search and API-doc generation
plugins:
  # Full-text search index used by the site search UI
  - search
  # Generates API reference pages from Python objects and docstrings
  - mkdocstrings:
      # Custom Jinja templates for mkdocstrings rendering
      # Custom override to direct users to the source code on Github directly from the API reference pages
      custom_templates: docs/overrides
      handlers:
        python:
          # Source roots used to import project modules
          paths: [src]
          options:
            # Parse docstrings using Google-style sections
            docstring_style: google
            # Show a link to the source code for each documented object
            show_source: true
            # Render the object name as the page heading
            show_root_heading: true
            # Include the object type (class/function/module) in headings
            show_symbol_type_heading: true
            # Include symbol types in the generated table of contents
            show_symbol_type_toc: true
            # Keep members in source-code order instead of alphabetical order
            members_order: source
            # Put signatures on a separate line for readability
            separate_signature: true
            # Show type annotations in signatures
            show_signature_annotations: true
            # Display Annotated types as their underlying type where possible
            unwrap_annotated: true
            # Fold __init__ docs into the class documentation block
            merge_init_into_class: true

# Markdown extensions used by docs pages
markdown_extensions:
  # Enables !!! note/warning/etc. blocks
  # See https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/#admonition
  - admonition
  # Lets Markdown files include snippets from other files
  # See https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown-extensions/#snippets
  - pymdownx.snippets:
      # Resolve snippet paths from the repository root
      base_path: .
  # Better code highlighting with optional line anchors and CSS classes
  # See https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown-extensions/#highlight
  - pymdownx.highlight:
      # Add anchor links for individual code lines
      anchor_linenums: true
      # Wrap highlighted lines in spans for styling and linking
      line_spans: __span
      # Add language-specific CSS classes for fenced code blocks
      pygments_lang_class: true
  # Inline code highlighting using special syntax
  - pymdownx.inlinehilite
  # Allows nested fenced blocks, tabs, Mermaid, etc. inside Markdown
  - pymdownx.superfences
  # Lets admonitions be collapsible
  - pymdownx.details
  # Builds the on-page table of contents from headings
  - toc:
      # Appends a permalink icon to each heading for easy linking
      permalink: true

# Navigation structure for the generated docs site
nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Guides:
      - Overview: guides/index.md
      - Token queries: guides/tokens.md
      - Relations: guides/relations.md
      - Parallel corpora: guides/parallel.md
      - LLM workflows: guides/llm-workflows.md
      - AST & parser design: guides/ast-design.md
      - BCQL cheatsheet: guides/cheatsheet.md
      - Operators & CQL compatibility: guides/misc.md
  - API Reference:
      - bcql_py (top-level): api/top_level.md
      - Exceptions: api/exceptions.md
      - Models:
          - Overview: api/models/index.md
          - Base: api/models/base.md
          - Token: api/models/token.md
          - Sequence: api/models/sequence.md
          - Span: api/models/span.md
          - Capture: api/models/capture.md
          - Lookaround: api/models/lookaround.md
          - Relation: api/models/relation.md
          - Alignment: api/models/alignment.md
          - Function: api/models/function.md
      - Parser internals:
          - Lexer: api/parser/lexer.md
          - Parser: api/parser/parser.md
          - Tokens: api/parser/tokens.md
